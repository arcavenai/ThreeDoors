name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@v0.7.0

      - name: Check formatting (gofumpt)
        run: |
          UNFORMATTED=$(gofumpt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files need formatting with gofumpt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7

      - name: Run tests with coverage
        run: go test ./... -v -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

      - name: Validate build
        run: go build -o /dev/null ./cmd/threedoors

  build-binaries:
    name: Build Binaries
    needs: quality-gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Generate version
        id: version
        run: |
          VERSION="0.1.0-alpha.$(date -u +%Y%m%d).${GITHUB_SHA::7}"
          TAG="alpha-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          LDFLAGS="-X main.version=${{ steps.version.outputs.version }}"
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o threedoors-darwin-arm64 ./cmd/threedoors
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o threedoors-darwin-amd64 ./cmd/threedoors
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o threedoors-linux-amd64 ./cmd/threedoors

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: threedoors-*
          retention-days: 14

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

  sign-and-notarize:
    name: Sign & Notarize
    needs: build-binaries
    if: github.event_name == 'push' && vars.SIGNING_ENABLED == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Import certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          # Import application certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm cert.p12

          # Import installer certificate (for pkg signing)
          echo "$APPLE_INSTALLER_CERTIFICATE_P12" | base64 --decode > installer-cert.p12
          security import installer-cert.p12 -k build.keychain -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/productsign
          rm installer-cert.p12

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign darwin binaries
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp threedoors-darwin-arm64
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp threedoors-darwin-amd64

      - name: Verify signatures
        run: |
          codesign --verify --deep --strict threedoors-darwin-arm64
          codesign --verify --deep --strict threedoors-darwin-amd64

      - name: Notarize binaries
        env:
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          for BINARY in threedoors-darwin-arm64 threedoors-darwin-amd64; do
            echo "Notarizing $BINARY..."
            zip "${BINARY}.zip" "$BINARY"
            xcrun notarytool submit "${BINARY}.zip" \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_PASSWORD" \
              --team-id "$APPLE_NOTARIZATION_TEAM_ID" \
              --wait --timeout 1800
            rm "${BINARY}.zip"
          done

      - name: Verify Gatekeeper assessment
        run: |
          spctl --assess --type execute threedoors-darwin-arm64
          spctl --assess --type execute threedoors-darwin-amd64

      - name: Build pkg installers
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          VERSION="${{ needs.build-binaries.outputs.version }}"
          chmod +x scripts/create-pkg.sh

          # Build arm64 pkg
          ./scripts/create-pkg.sh threedoors-darwin-arm64 "$VERSION" "$APPLE_INSTALLER_IDENTITY" threedoors-arm64.pkg

          # Build amd64 pkg
          ./scripts/create-pkg.sh threedoors-darwin-amd64 "$VERSION" "$APPLE_INSTALLER_IDENTITY" threedoors-amd64.pkg

          # Notarize and staple pkgs
          for PKG in threedoors-arm64.pkg threedoors-amd64.pkg; do
            echo "Notarizing $PKG..."
            xcrun notarytool submit "$PKG" \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_PASSWORD" \
              --team-id "$APPLE_NOTARIZATION_TEAM_ID" \
              --wait --timeout 1800
            xcrun stapler staple "$PKG"
          done

      - name: Upload signed binaries and pkgs
        uses: actions/upload-artifact@v4
        with:
          name: signed-binaries
          path: |
            threedoors-darwin-arm64
            threedoors-darwin-amd64
            threedoors-arm64.pkg
            threedoors-amd64.pkg
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true

  release:
    name: Create Release
    needs: [build-binaries, sign-and-notarize]
    if: github.event_name == 'push' && !cancelled() && needs.build-binaries.result == 'success'
    runs-on: ubuntu-latest
    steps:
      # Try signed binaries first, fall back to unsigned
      - name: Download signed binaries
        if: needs.sign-and-notarize.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: signed-binaries

      - name: Download unsigned binaries (fallback)
        if: needs.sign-and-notarize.result != 'success'
        uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Download all binaries (for linux)
        if: needs.sign-and-notarize.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: unsigned-binaries

      - name: Copy linux binary from unsigned artifacts
        if: needs.sign-and-notarize.result == 'success'
        run: cp unsigned-binaries/threedoors-linux-amd64 . && rm -rf unsigned-binaries

      - name: List release files
        run: ls -la threedoors-* *.pkg 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-binaries.outputs.tag }}
          name: Alpha ${{ needs.build-binaries.outputs.tag }}
          body: |
            Automated alpha release from merge to main.

            **Version:** ${{ needs.build-binaries.outputs.version }}
            **Commit:** ${{ github.sha }}
            **Signed:** ${{ needs.sign-and-notarize.result == 'success' && 'Yes (Apple Developer ID)' || 'No (unsigned)' }}

            **Binaries:**
            - `threedoors-darwin-arm64` — macOS Apple Silicon
            - `threedoors-darwin-amd64` — macOS Intel
            - `threedoors-linux-amd64` — Linux x86_64
            ${{ needs.sign-and-notarize.result == 'success' && '- `threedoors-arm64.pkg` — macOS Installer (Apple Silicon)\n- `threedoors-amd64.pkg` — macOS Installer (Intel)' || '' }}
          prerelease: true
          files: |
            threedoors-*

  update-homebrew:
    name: Update Homebrew Tap
    needs: [build-binaries, release]
    if: github.event_name == 'push' && needs.release.result == 'success' && vars.SIGNING_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download signed binaries
        uses: actions/download-artifact@v4
        with:
          name: signed-binaries

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.build-binaries.outputs.version }}"
          TAG="${{ needs.build-binaries.outputs.tag }}"

          SHA256_ARM64=$(shasum -a 256 threedoors-darwin-arm64 | cut -d' ' -f1)
          SHA256_AMD64=$(shasum -a 256 threedoors-darwin-amd64 | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/arcaven/homebrew-tap.git" homebrew-tap-repo
          cd homebrew-tap-repo

          mkdir -p Formula
          cp ../Formula/threedoors.rb Formula/threedoors.rb

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Formula/threedoors.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" Formula/threedoors.rb
          sed -i "s/SHA256_ARM64_PLACEHOLDER/$SHA256_ARM64/g" Formula/threedoors.rb
          sed -i "s/SHA256_AMD64_PLACEHOLDER/$SHA256_AMD64/g" Formula/threedoors.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/threedoors.rb
          git commit -m "Update threedoors to $VERSION"
          git push
